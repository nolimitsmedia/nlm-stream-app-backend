# NGINX config for NLM Streaming Manager
#
# CURRENT STATE (as of this deployment): using a self-signed certificate
# on the raw server IP as a temporary unblock for mixed-content issues
# while testing against the real frontend (which is served over HTTPS).
# This is NOT suitable for the client-facing production domain.
#
# TO GENERATE the self-signed cert on a fresh server:
#   mkdir -p /etc/nginx/ssl
#   openssl req -x509 -nodes -days 365 -newkey rsa:2048 \
#     -keyout /etc/nginx/ssl/selfsigned.key \
#     -out /etc/nginx/ssl/selfsigned.crt \
#     -subj "/CN=<server-ip-or-hostname>"
#
# TODO once a real domain is available:
#   - Replace server_name _ with the real domain
#   - Replace ssl_certificate/ssl_certificate_key with Let's Encrypt
#     (certbot --nginx -d yourdomain.com)

server {
    listen 443 ssl;
    server_name _;

    ssl_certificate     /etc/nginx/ssl/selfsigned.crt;
    ssl_certificate_key /etc/nginx/ssl/selfsigned.key;

    # Node/Express API
    location / {
        proxy_pass http://127.0.0.1:5000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # Socket.IO/WebSocket support
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
    }

    # HLS proxy from SRS
    location /hls/ {
        proxy_pass http://127.0.0.1:8080/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        add_header Cache-Control no-cache;
        add_header Access-Control-Allow-Origin *;
        types {
            application/vnd.apple.mpegurl m3u8;
            video/mp2t ts;
        }
    }
}

# Redirect plain HTTP to HTTPS
server {
    listen 80;
    server_name _;
    return 301 https://$host$request_uri;
}
